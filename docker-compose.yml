services:
  traefik:
    image: traefik:v3.6.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}-traefik"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--ping=true"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - traefik

  postgres:
    image: kartoza/postgis:18-3.6
    environment:
      - POSTGRES_DBNAME=${POSTGRES_DBNAME}
      - POSTGRES_PASS=${POSTGRES_PASS}
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - ./data/pg:/var/lib/postgresql/
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=${POSTGRES_PASS} pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DBNAME} -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    ports:
      - 5432:5432
    networks:
      - backend

  jupyter:
    profiles: [ init ]
    image: git.unepgrid.ch/nostradamus/cube-in-a-box-jupyter:20260126
    init: true
    environment:
      - ODC_DEFAULT_DB_HOSTNAME=postgres
      - ODC_DEFAULT_DB_PORT=5432
      - ODC_DEFAULT_DB_USERNAME=${POSTGRES_USER}
      - ODC_DEFAULT_DB_PASSWORD=${POSTGRES_PASS}
      - ODC_DEFAULT_DB_DATABASE=${POSTGRES_DBNAME}
      - AWS_NO_SIGN_REQUEST=true
      - STAC_API_URL=https://explorer.sandbox.dea.ga.gov.au/stac/
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./products:/conf
      - ./data/local_data:/local_data
      - ./distributed.yaml:/etc/dask/distributed.yaml
    healthcheck:
      test: [ "CMD", "python3", "-c", "import sys; sys.exit(0)" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: no
    networks:
      - backend

  jupyterhub:
    image: git.unepgrid.ch/nostradamus/cube-in-a-box-hub:20260126
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/jupyterhub_data:/data
      - ./hub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - ./data/shared:/shared
    environment:
      - JUPYTERHUB_ADMINS=${JUPYTERHUB_ADMINS}
      - JUPYTERHUB_USERS=${JUPYTERHUB_USERS}
      - DOCKER_JUPYTER_IMAGE=git.unepgrid.ch/nostradamus/cube-in-a-box-jupyter:20260126
      - DOCKER_NETWORK_NAME=${COMPOSE_PROJECT_NAME}-backend
      - POSTGRES_DBNAME=${POSTGRES_DBNAME}
      - POSTGRES_PASS=${POSTGRES_PASS}
      - POSTGRES_USER=${POSTGRES_USER}
      - HOST_PRODUCTS_DIR=${PWD}/products
      - HOST_DATA_DIR=${PWD}/data/local_data
      - HOST_DISTRIBUTED_CONFIG=${PWD}/distributed.yaml
      - HOST_NOTEBOOKS_DIR=${PWD}/notebooks_demo
      - HOST_SHARED_DIR=${PWD}/data/shared
      - HOST_SHARED_README=${PWD}/shared_README.md
      - CONTAINER_SHARED_DIR=/shared
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/jupyter/hub/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - traefik
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jupyterhub.rule=Host(`${DOMAIN}`) && PathPrefix(`/jupyter`)"
      - "traefik.http.routers.jupyterhub.entrypoints=web"
      - "traefik.http.routers.jupyterhub.priority=100"
      - "traefik.http.routers.jupyterhub.service=jupyterhub"
      - "traefik.http.services.jupyterhub.loadbalancer.server.port=8000"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME}-traefik"

  explorer:
    image: git.unepgrid.ch/nostradamus/cube-in-a-box-explorer:20260126
    environment:
      - POSTGRES_HOSTNAME=postgres
      - PGPORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${POSTGRES_DBNAME}
      - ODC_DEFAULT_INDEX_DRIVER=postgres
      - ODC_POSTGIS_INDEX_DRIVER=postgis
      - ODC_DEFAULT_DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DBNAME}
      - ODC_POSTGIS_DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DBNAME}
      - FLASK_ENV=development
      - FLASK_APP=cubedash
      - FLASK_DEBUG=1
      - CUBEDASH_DEFAULT_TIMEZONE=Europe/Zurich
      - SCRIPT_NAME=/explorer
      - CUBEDASH_BASE_URL=/explorer
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy
    volumes:
      - ./data/local_data:/local_data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/explorer/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - traefik
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.explorer.rule=Host(`${DOMAIN}`) && PathPrefix(`/explorer`)"
      - "traefik.http.routers.explorer.entrypoints=web"
      - "traefik.http.routers.explorer.priority=100"
      - "traefik.http.routers.explorer.service=explorer"
      - "traefik.http.services.explorer.loadbalancer.server.port=8080"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME}-traefik"

networks:
  traefik:
    name: ${COMPOSE_PROJECT_NAME}-traefik
    driver: bridge
  backend:
    name: ${COMPOSE_PROJECT_NAME}-backend
    driver: bridge
