# =============================================================================
# YAML Anchors - Reusable configuration blocks
# =============================================================================

# Open Data Cube database connection environment variables
# Used by jupyter, jupyterhub, and explorer services to connect to PostgreSQL
x-odc-db-env: &odc-db-env
  POSTGRES_HOSTNAME: ${POSTGRES_HOSTNAME}
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASS: ${POSTGRES_PASS}
  POSTGRES_DBNAME: ${POSTGRES_DBNAME}

# =============================================================================
# Services
# =============================================================================

services:
  traefik:
    image: traefik:v3.6.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}-traefik"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--ping=true"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - traefik

  postgres:
    image: kartoza/postgis:18-3.6
    environment:
      - POSTGRES_DBNAME=${POSTGRES_DBNAME}
      - POSTGRES_PASS=${POSTGRES_PASS}
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - ./data/pg:/var/lib/postgresql/
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=${POSTGRES_PASS} pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DBNAME} -p ${POSTGRES_PORT}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    ports:
      - 5432:${POSTGRES_PORT}
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Jupyter - Used for initialization tasks (product definitions, indexing)
  # Profile: init (only started when explicitly needed)
  # ---------------------------------------------------------------------------
  jupyter:
    profiles: [ init ]
    image: git.unepgrid.ch/nostradamus/cube-in-a-box-jupyter:${IMAGE_VERSION}
    init: true
    environment:
      # ODC database connection (using YAML anchor)
      <<: *odc-db-env
      # Additional environment variables
      ODC_DEFAULT_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@${POSTGRES_HOSTNAME}:${POSTGRES_PORT}/${POSTGRES_DBNAME}
      AWS_NO_SIGN_REQUEST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./products:/conf
      - ./data/local_data:/local_data
      - ./distributed.yaml:/etc/dask/distributed.yaml
    healthcheck:
      test: [ "CMD", "python3", "-c", "import sys; sys.exit(0)" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: "no"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # JupyterHub - Multi-user notebook server with Docker-out-of-Docker spawning
  # ---------------------------------------------------------------------------
  jupyterhub:
    image: git.unepgrid.ch/nostradamus/cube-in-a-box-hub:${IMAGE_VERSION}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/jupyterhub_data:/data
      - ./hub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - ./shared:/shared_static:ro
      - ./data/shared:/shared_users
    environment:
      # ODC database connection (using YAML anchor)
      <<: *odc-db-env
      # User management
      JUPYTERHUB_ADMINS: ${JUPYTERHUB_ADMINS}
      JUPYTERHUB_USERS: ${JUPYTERHUB_USERS}
      # Docker spawner configuration
      DOCKER_JUPYTER_IMAGE: git.unepgrid.ch/nostradamus/cube-in-a-box-jupyter:${IMAGE_VERSION}
      DOCKER_NETWORK_NAME: ${COMPOSE_PROJECT_NAME}-backend
      # HOST_* variables: Required for Docker-out-of-Docker pattern
      # JupyterHub spawns user containers and needs to know the HOST paths to mount them
      HOST_PRODUCTS_DIR: ${PWD}/products
      HOST_DATA_DIR: ${PWD}/data/local_data
      HOST_DISTRIBUTED_CONFIG: ${PWD}/distributed.yaml
      HOST_SHARED_STATIC: ${PWD}/shared
      HOST_USER_FOLDERS: ${PWD}/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/jupyter/hub/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - traefik
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jupyterhub.rule=Host(`${DOMAIN}`) && PathPrefix(`/jupyter`)"
      - "traefik.http.routers.jupyterhub.entrypoints=web"
      - "traefik.http.routers.jupyterhub.priority=100"
      - "traefik.http.routers.jupyterhub.service=jupyterhub"
      - "traefik.http.services.jupyterhub.loadbalancer.server.port=8000"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME}-traefik"

  # ---------------------------------------------------------------------------
  # Explorer - Web UI for browsing Open Data Cube datasets
  # ---------------------------------------------------------------------------
  explorer:
    image: git.unepgrid.ch/nostradamus/cube-in-a-box-explorer:${IMAGE_VERSION}
    environment:
      # ODC database connection (using YAML anchor)
      <<: *odc-db-env
      # ODC configuration
      ODC_DEFAULT_INDEX_DRIVER: postgres
      ODC_POSTGIS_INDEX_DRIVER: postgis
      ODC_DEFAULT_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@${POSTGRES_HOSTNAME}:${POSTGRES_PORT}/${POSTGRES_DBNAME}
      ODC_POSTGIS_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@${POSTGRES_HOSTNAME}:${POSTGRES_PORT}/${POSTGRES_DBNAME}
      # Flask configuration
      FLASK_ENV: development
      FLASK_APP: cubedash
      FLASK_DEBUG: 1
      CUBEDASH_DEFAULT_TIMEZONE: Europe/Zurich
      SCRIPT_NAME: /explorer
      CUBEDASH_BASE_URL: /explorer
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy
    volumes:
      - ./data/local_data:/local_data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/explorer/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - traefik
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.explorer.rule=Host(`${DOMAIN}`) && PathPrefix(`/explorer`)"
      - "traefik.http.routers.explorer.entrypoints=web"
      - "traefik.http.routers.explorer.priority=100"
      - "traefik.http.routers.explorer.service=explorer"
      - "traefik.http.services.explorer.loadbalancer.server.port=8080"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME}-traefik"

# =============================================================================
# Networks
# =============================================================================
# Explicit network names with project prefix to support multiple instances
# (e.g., running dev and prod simultaneously)
networks:
  traefik:
    name: ${COMPOSE_PROJECT_NAME}-traefik
    driver: bridge
  backend:
    name: ${COMPOSE_PROJECT_NAME}-backend
    driver: bridge
